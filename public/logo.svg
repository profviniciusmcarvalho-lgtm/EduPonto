<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#2563eb"/>
  <circle cx="100" cy="100" r="88" fill="#1d4ed8"/>

  <!-- Clock face -->
  <circle cx="100" cy="110" r="62" fill="white" opacity="0.97"/>
  <circle cx="100" cy="110" r="56" fill="white"/>
  <!-- Clock ticks -->
  <line x1="100" y1="58" x2="100" y2="66" stroke="#cbd5e1" stroke-width="3"/>
  <line x1="100" y1="154" x2="100" y2="162" stroke="#cbd5e1" stroke-width="3"/>
  <line x1="144" y1="110" x2="152" y2="110" stroke="#cbd5e1" stroke-width="3"/>
  <line x1="48" y1="110" x2="56" y2="110" stroke="#cbd5e1" stroke-width="3"/>
  <!-- Center dot -->
  <circle cx="100" cy="110" r="4" fill="#1e293b"/>
  <!-- Hour hand -->
  <line x1="100" y1="110" x2="100" y2="82" stroke="#1e293b" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="100" y1="110" x2="122" y2="120" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>

  <!-- Graduation cap -->
  <ellipse cx="100" cy="52" rx="42" ry="11" fill="#1e293b"/>
  <rect x="74" y="34" width="52" height="20" rx="6" fill="#1e293b"/>
  <!-- Tassel -->
  <line x1="140" y1="52" x2="150" y2="70" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <circle cx="150" cy="72" r="5" fill="#fbbf24"/>
</svg>
