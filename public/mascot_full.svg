<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="268" rx="50" ry="10" fill="#1e40af" opacity="0.15"/>

  <!-- Legs -->
  <rect x="72" y="220" width="22" height="44" rx="11" fill="#1d4ed8"/>
  <rect x="106" y="220" width="22" height="44" rx="11" fill="#1d4ed8"/>

  <!-- Shoes -->
  <ellipse cx="83" cy="264" rx="16" ry="8" fill="#1e293b"/>
  <ellipse cx="117" cy="264" rx="16" ry="8" fill="#1e293b"/>

  <!-- Body -->
  <rect x="50" y="130" width="100" height="98" rx="30" fill="#2563eb"/>
  <!-- Body detail -->
  <rect x="66" y="148" width="68" height="62" rx="18" fill="#1d4ed8"/>

  <!-- Arms -->
  <rect x="18" y="140" width="38" height="18" rx="9" fill="#2563eb" transform="rotate(-20 18 140)"/>
  <rect x="144" y="140" width="38" height="18" rx="9" fill="#2563eb" transform="rotate(20 144 140)"/>

  <!-- Hands -->
  <circle cx="14" cy="153" r="12" fill="#fbbf24"/>
  <circle cx="186" cy="153" r="12" fill="#fbbf24"/>

  <!-- Book in left hand -->
  <rect x="2" y="158" width="24" height="18" rx="3" fill="#ef4444"/>
  <line x1="14" y1="158" x2="14" y2="176" stroke="white" stroke-width="1.5"/>

  <!-- Neck -->
  <rect x="88" y="122" width="24" height="16" rx="8" fill="#fbbf24"/>

  <!-- Head -->
  <circle cx="100" cy="96" r="52" fill="#fbbf24"/>
  <!-- Head highlight -->
  <circle cx="84" cy="78" r="18" fill="#fcd34d" opacity="0.4"/>

  <!-- Ears -->
  <circle cx="52" cy="96" r="10" fill="#fbbf24"/>
  <circle cx="148" cy="96" r="10" fill="#fbbf24"/>

  <!-- Eyes -->
  <circle cx="82" cy="92" r="13" fill="white"/>
  <circle cx="118" cy="92" r="13" fill="white"/>
  <circle cx="85" cy="95" r="7" fill="#1e293b"/>
  <circle cx="121" cy="95" r="7" fill="#1e293b"/>
  <!-- Eye shine -->
  <circle cx="88" cy="91" r="3" fill="white"/>
  <circle cx="124" cy="91" r="3" fill="white"/>

  <!-- Nose -->
  <ellipse cx="100" cy="108" rx="5" ry="3.5" fill="#f59e0b"/>

  <!-- Smile -->
  <path d="M 76 118 Q 100 136 124 118" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Cheeks -->
  <circle cx="66" cy="112" r="10" fill="#f87171" opacity="0.4"/>
  <circle cx="134" cy="112" r="10" fill="#f87171" opacity="0.4"/>

  <!-- Graduation cap base -->
  <ellipse cx="100" cy="48" rx="40" ry="10" fill="#1e293b"/>
  <!-- Cap top -->
  <rect x="76" y="28" width="48" height="22" rx="6" fill="#1e293b"/>
  <!-- Cap brim shine -->
  <ellipse cx="100" cy="48" rx="28" ry="6" fill="#334155" opacity="0.5"/>
  <!-- Tassel string -->
  <line x1="138" y1="48" x2="148" y2="70" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- Tassel -->
  <circle cx="148" cy="73" r="5" fill="#fbbf24"/>
  <line x1="148" y1="78" x2="143" y2="92" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="78" x2="148" y2="94" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="78" x2="153" y2="92" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>

  <!-- Clock on belly -->
  <circle cx="100" cy="176" r="20" fill="white" opacity="0.95"/>
  <circle cx="100" cy="176" r="17" fill="white"/>
  <circle cx="100" cy="176" r="2" fill="#1e293b"/>
  <!-- Clock ticks -->
  <line x1="100" y1="161" x2="100" y2="164" stroke="#64748b" stroke-width="1.5"/>
  <line x1="100" y1="188" x2="100" y2="191" stroke="#64748b" stroke-width="1.5"/>
  <line x1="115" y1="176" x2="118" y2="176" stroke="#64748b" stroke-width="1.5"/>
  <line x1="82" y1="176" x2="85" y2="176" stroke="#64748b" stroke-width="1.5"/>
  <!-- Clock hands -->
  <line x1="100" y1="176" x2="100" y2="164" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="176" x2="110" y2="180" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Stars decoration -->
  <text x="30" y="50" font-size="14" fill="#fbbf24" opacity="0.7">★</text>
  <text x="158" y="60" font-size="10" fill="#fbbf24" opacity="0.5">★</text>
  <text x="22" y="110" font-size="8" fill="#93c5fd" opacity="0.6">✦</text>
  <text x="168" y="115" font-size="10" fill="#93c5fd" opacity="0.6">✦</text>
</svg>
