<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <!-- Shadow -->
  <ellipse cx="80" cy="148" rx="36" ry="8" fill="#1e40af" opacity="0.15"/>

  <!-- Body -->
  <rect x="44" y="88" width="72" height="52" rx="20" fill="#2563eb"/>
  <rect x="56" y="96" width="48" height="36" rx="12" fill="#1d4ed8"/>

  <!-- Arms -->
  <rect x="20" y="92" width="28" height="14" rx="7" fill="#2563eb" transform="rotate(-15 20 92)"/>
  <rect x="112" y="92" width="28" height="14" rx="7" fill="#2563eb" transform="rotate(15 112 92)"/>

  <!-- Hands waving -->
  <circle cx="18" cy="101" r="9" fill="#fbbf24"/>
  <circle cx="142" cy="101" r="9" fill="#fbbf24"/>

  <!-- Head -->
  <circle cx="80" cy="68" r="40" fill="#fbbf24"/>
  <!-- Head highlight -->
  <circle cx="68" cy="56" r="12" fill="#fcd34d" opacity="0.5"/>

  <!-- Eyes -->
  <circle cx="66" cy="66" r="9" fill="white"/>
  <circle cx="94" cy="66" r="9" fill="white"/>
  <circle cx="68" cy="68" r="5" fill="#1e293b"/>
  <circle cx="96" cy="68" r="5" fill="#1e293b"/>
  <!-- Eye shine -->
  <circle cx="70" cy="66" r="2" fill="white"/>
  <circle cx="98" cy="66" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M 62 80 Q 80 94 98 80" stroke="#1e293b" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Cheeks -->
  <circle cx="55" cy="78" r="7" fill="#f87171" opacity="0.4"/>
  <circle cx="105" cy="78" r="7" fill="#f87171" opacity="0.4"/>

  <!-- Graduation cap base -->
  <ellipse cx="80" cy="32" rx="30" ry="7" fill="#1e293b"/>
  <!-- Cap top -->
  <rect x="62" y="18" width="36" height="16" rx="4" fill="#1e293b"/>
  <!-- Cap brim shine -->
  <ellipse cx="80" cy="32" rx="22" ry="4" fill="#334155" opacity="0.5"/>
  <!-- Tassel string -->
  <line x1="108" y1="32" x2="116" y2="48" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="116" cy="50" r="4" fill="#fbbf24"/>
  <line x1="116" y1="54" x2="112" y2="64" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="116" y1="54" x2="116" y2="66" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="116" y1="54" x2="120" y2="64" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Clock badge on body -->
  <circle cx="80" cy="112" r="13" fill="white" opacity="0.9"/>
  <circle cx="80" cy="112" r="11" fill="white"/>
  <circle cx="80" cy="112" r="1.5" fill="#1e293b"/>
  <!-- Clock hands -->
  <line x1="80" y1="112" x2="80" y2="104" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="112" x2="87" y2="115" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>

  <!-- Feet -->
  <ellipse cx="65" cy="140" rx="12" ry="7" fill="#1d4ed8" transform="rotate(-10 65 140)"/>
  <ellipse cx="95" cy="140" rx="12" ry="7" fill="#1d4ed8" transform="rotate(10 95 140)"/>
</svg>
